syntax = "proto3";

import "google/protobuf/timestamp.proto";

import "api/proto/common/yagpcc_metrics.proto";
import "api/proto/common/yagpcc_session.proto";

package yagpcc;
option java_outer_classname = "MasterYAGPCCAG";
option go_package = "github.com/open-gpdb/yagpcc/api/proto/agent_master;greenplum";

service GetGPInfo {
    rpc GetGPSessions (GetGPSessionsReq) returns (GetGPSessionsResponse) {}
    rpc GetGPQuery    (GetGPQueryReq) returns (GetGPQueryResponse) {}
    rpc GetGPQueries (GetGPQueriesReq) returns (GetGPSessionsResponse) {}
    rpc GetGPSession  (GetGPSessionReq) returns (GetGPSessionResponse) {}
    rpc GetTotalSessionsStat (GetTotalSessionsReq) returns (GetTotalSessionsResponse) {}
}

message GetTotalSessionsReq {
}

message GetGPQueriesReq {
    repeated SessionFieldWrapper field              =  1;
    repeated SessionFilter filter                   =  2;
    int64 page_size                                 =  3;
    string page_token                               =  4;
}

message SessionStat {
    string state   =  1;
    double count   =  2;
}

message GetTotalSessionsResponse {
    repeated SessionStat sessions_stat = 1;
}

enum RunningQueryType
{
    RQT_UNSPECIFIED = 0;
    RQT_TOP         = 1;           /* show top query */
    RQT_LAST        = 2;           /* show last executed query */
}


message GetGPSessionsReq {
    bool show_system                                =  1;
    repeated SessionFieldWrapper field              =  2;
    repeated SessionFilter filter                   =  3;
    int64 page_size                                 =  4;
    string page_token                               =  5;
    bool hide_empty_queries                         =  6;
    RunningQueryType show_query_type                =  7;
}

message GetGPSessionsResponse {
    repeated SessionState sessions_state = 1;
    string next_page_token               = 2;
}

message GetGPQueryReq {
    QueryKey query_key  = 1;
}

message GetGPQueryResponse {
    TotalQueryData queries_data = 1;
}

message GetGPSessionReq {
    SessionKey session_key  = 1;
}

message GetGPSessionResponse {
    SessionState sessions_state = 1;
}

enum StatKind
{
    SK_UNSPECIFIED = 0;
    SK_PRECISE     = 1;           /* Each query has their own metrics */
    SK_AGGREGATED  = 2;           /* All metrics was agregated in interval-based fashion, start interval and end interval see in start_time and end_time  */
}

message TotalQueryData {
   reserved 3;
   QueryStat query_stat = 1;
   repeated SegmentMetrics segment_query_metrics = 2;
}


message QueryStat {
    string cluster_id                               = 1;
    string hostname                                 = 2;
    google.protobuf.Timestamp collect_time          = 3;
    QueryKey query_key                              = 4;
    QueryInfo query_info                            = 5;
    StatKind stat_kind                              = 6;
    QueryStatus query_status                        = 7;
    google.protobuf.Timestamp start_time            = 8;
    google.protobuf.Timestamp end_time              = 9;
    bool completed                                  = 10; // query completed or not
    GPMetrics total_query_metrics                   = 11; // query metrics calculated as sum from segments
    AggregatedMetrics aggregated_metrics            = 12; // set if stat_kind == SK_AGGREGATED - for short queries
    int64 blocked_by_sess_id                        = 13;
    string wait_mode                                = 14;
    string locked_item                              = 15;
    string locked_mode                              = 16;
    string session_state                            = 17;
    string message                                  = 18;
    int64 slices                                    = 19; // the number of registered slices for a query
}

message QueryStatWrite {
    string cluster_id                               = 1;
    string hostname                                 = 2;
    string collect_time                             = 3;
    QueryKey query_key                              = 4;
    QueryInfo query_info                            = 5;
    StatKind stat_kind                              = 6;
    QueryStatus query_status                        = 7;
    string start_time                               = 8;
    string end_time                                 = 9;
    bool completed                                  = 10; // query completed or not
    GPMetrics total_query_metrics                   = 11; // query metrics calculated as sum from segments
    AggregatedMetrics aggregated_metrics            = 12; // set if stat_kind == SK_AGGREGATED - for short queries
    int64 blocked_by_sess_id                        = 13;
    string wait_mode                                = 14;
    string locked_item                              = 15;
    string locked_mode                              = 16;
    string session_state                            = 17;
    string message                                  = 18;
    int64 slices                                    = 19; // the number of registered slices for a query
}

message AggregatedMetrics {
    int64 calls         = 1;
    double min_time     = 2;  // min_exec_time
    double max_time     = 3;  // max_exec_time
    double mean_time    = 4;  // mean_exec_time
    double stddev_time  = 5;  // stddev_exec_time
    double total_time   = 6;  // total_exec_time
}

message SegmentMetrics {
    reserved 5, 10;
    string cluster_id                              = 1;
    string hostname                                = 2;
    google.protobuf.Timestamp collect_time         = 3;
    SegmentKey segment_key                         = 4;
    QueryStatus query_status                       = 6;
    google.protobuf.Timestamp start_time           = 7;
    google.protobuf.Timestamp end_time             = 8;
    GPMetrics segment_metrics                      = 9;
    QueryKey query_key                             = 11; // set is used outside of TotalQueryData
    QueryInfo query_info                           = 12; // set is used outside of TotalQueryData
}

message SegmentMetricsWrite {
    reserved 5, 10;
    string cluster_id                              = 1;
    string hostname                                = 2;
    string collect_time                            = 3;
    SegmentKey segment_key                         = 4;
    QueryStatus query_status                       = 6;
    string start_time                              = 7;
    string end_time                                = 8;
    GPMetrics segment_metrics                      = 9;
    QueryKey query_key                             = 11; // set is used outside of TotalQueryData
    QueryInfo query_info                           = 12; // set is used outside of TotalQueryData
}

