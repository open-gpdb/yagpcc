syntax = "proto3";

package yagpcc;
option java_outer_classname = "SegmentYAGPCCM";
option go_package = "github.com/open-gpdb/yagpcc/api/proto/common;greenplum";

import "google/protobuf/timestamp.proto";

enum QueryStatus {
    QUERY_STATUS_UNSPECIFIED = 0;
    QUERY_STATUS_SUBMIT = 1;
    QUERY_STATUS_START = 2;
    QUERY_STATUS_DONE = 3;
    QUERY_STATUS_QUERY_DONE = 4;
    QUERY_STATUS_ERROR = 5;
    QUERY_STATUS_CANCELLING = 6;
    QUERY_STATUS_CANCELED = 7;
    QUERY_STATUS_END = 8;
}

// QueryInfo: various attributes of the query.
message QueryInfo {
    // generator: indicates plan generator used for query: GPORCA/postgres legacy optimizer.
    PlanGenerator generator = 1;

    // query_id: normalized query hash value.
    uint64 query_id = 2;

    // plan_id: normalized plan hash value.
    uint64 plan_id = 3;

    // query_text: query raw text.
    string query_text = 4;

    // plan_text: plan raw text.
    string plan_text = 5;

    // template_query_text: normalized query text.
    // Deprecated: unused.
    string template_query_text = 6 [deprecated = true];

    // template_plan_text: normalized plan text.
    // Deprecated: unused.
    string template_plan_text = 7 [deprecated = true];

    // userName: name of the user executing query.
    string userName = 8;

    // databaseName: name of the database where query is executing.
    string databaseName = 9;

    // rsgname: name of the resource group where query is executing.
    string rsgname = 10;

    // analyze_text: explain analyze in text format.
    string analyze_text = 11;

   // submit time: time when query was submitted
    google.protobuf.Timestamp submit_time           =  12; 

   // start time: time when query started execution
    google.protobuf.Timestamp start_time            =  13;

   // end time: time when query finished
    google.protobuf.Timestamp end_time              =  14;
}

message AdditionalQueryInfo {
    int64 nested_level                    = 1;
    string error_message                  = 2;
    int64 slice_id                        = 3;
}

message AdditionalQueryStat {
    string error_message                  = 1;
}

enum PlanGenerator
{
    // PLAN_GENERATOR_UNSPECIFIED: the generator value is unknown or not set.
    PLAN_GENERATOR_UNSPECIFIED = 0;

    // PLAN_GENERATOR_PLANNER: the query plan was generated by the postgres legacy optimizer.
    PLAN_GENERATOR_PLANNER = 1;

    // PLAN_GENERATOR_OPTIMIZER: the query plan was generated by the GPORCA.
    PLAN_GENERATOR_OPTIMIZER = 2;
}

// GPMetrics: collection of system and Greenplum related statistics
// associated with the session or the query (depending on context).
message GPMetrics {
    // systemStat: statistics collected from procfs for query or session (depending on context)
    SystemStat systemStat = 1;

    // instrumentation: various statistics related to query plan nodes.
    MetricInstrumentation instrumentation = 2;

    // spill: detailed statistics about produced spill files
    SpillInfo spill = 3;
}

// QueryKey: compound cluster wide unique query identifier.
message QueryKey {
    // tmid: distributed transaction timestamp (as unix timestamp)
    // to ensure QueryKey uniqueness through all cluster lifetime.
    int32 tmid = 1;

    // ssid: query session identifier from pg_stat_activity system view.
    int32 ssid = 2;

    // ccnt: the command number within this session as shown by gp_command_count.
    // All records associated with the query will have the same ccnt.
    int32 ccnt = 3;
}

// SegmentKey: compound cluster wide segment identifier.
message SegmentKey {
    // dbid: the dbid of this database.
    int32 dbid = 1;

    // segindex: content indicator:
    // * -1 for entry database,
    // * 0, ..., n-1 for segment database
    // * a primary and its mirror have the same segIndex.
    int32 segindex = 2;
}

// SystemStat: statistics collected from procfs for query or session (depending on context).
message SystemStat {
    // runningTimeSeconds: sum of userTimeSeconds and kernelTimeSeconds
    // theese value is ignored by yagpcc and calculated using userTimeSeconds and kernelTimeSeconds once again
    //
    // Importance: major
    // Aggregation: sum
    double runningTimeSeconds = 1;

    // userTimeSeconds: total amount of CPU seconds spent in user space
    // by all backend processes associated with query or session.
    //
    // Source: /proc/pid/stat utime
    // Importance: major
    // Aggregation: sum
    double userTimeSeconds = 2;

    // kernelTimeSeconds: total amount of CPU seconds spent in kernel space
    // by all backend processes associated with query or session.
    //
    // Source: /proc/pid/stat stime
    // Importance: major
    // Aggregation: sum
    double kernelTimeSeconds = 3;

    // vsize: maximum virtual memory size (in bytes)
    // used by all backend processes associated with the query or session.
    //
    // Source: /proc/pid/stat vsize
    // Importance: major (possibly wrong aggregation algorithm)
    // Aggregation: max
    uint64 vsize = 4;

    // rss: max amount of consumed physical memory (RAM)
    // of all backend processes associated with query or session.
    //
    // Source: /proc/pid/stat rss
    // Importance: major (possibly wrong aggregation algorithm)
    // Aggregation: max
    uint64 rss = 5;

    // VmSizeKb: maximum virtual memory size (in kilobytes) currently allocated
    // to all backend processes associated with the query or session.
    //
    // Source: /proc/pid/status VmSize
    // Importance: major (possibly wrong aggregation algorithm)
    // Aggregation: max
    // Deprecated: duplicate of vsize.
    uint64 VmSizeKb = 6 [deprecated = true];

    // VmPeakKb: max peak virtual memory size that the backend process
    // associated with query or session has consumed since its inception.
    //
    // Source: /proc/pid/status VmPeak
    // Importance: major (possibly wrong aggregation algorithm)
    // Aggregation: max
    uint64 VmPeakKb = 7;

    // rchar: total number of characters (bytes) that have been passed to successful read(2)
    // and similar system calls by all of backend processes associated with query or session.
    //
    // Source: /proc/pid/io rchar
    // Importance: normal
    // Aggregation: sum
    uint64 rchar = 8;

    // wchar: total number of bytes that a process has passed to system calls like
    // write(), pwrite(), sendfile(), copy_file_range(), and similar functions
    // by all of backend processes associated with query or session.
    //
    // Source: /proc/pid/io wchar
    // Importance: normal
    // Aggregation: sum
    uint64 wchar = 9;

    // syscr: total number of "file read" system calls performed
    // by all of backend processes associated with query or session.
    //
    // Source: /proc/pid/io syscr
    // Importance: minor
    // Aggregation: sum
    uint64 syscr = 10;

    // syscw: total number of "file write" system calls performed
    // by all of backend processes associated with query or session.
    //
    // Source: /proc/pid/io syscw
    // Importance: minor
    // Aggregation: sum
    uint64 syscw = 11;

    // read_bytes: total number of bytes that all of backend processes associated with query or session
    // has really fetched from the storage layer.
    //
    // Source: /proc/pid/io read_bytes
    // Importance: major
    // Aggregation: sum
    uint64 read_bytes = 12;

    // write_bytes: total number of bytes that all of backend processes associated with query or session
    // are really sent to the storage layer.
    // Reflecting actual disk I/O.
    //
    // Source: /proc/pid/io write_bytes
    // Importance: major
    // Aggregation: sum
    uint64 write_bytes = 13;

    // cancelled_write_bytes: total number of bytes that were initially accounted as writes
    // by all of backend processes associated with query or session
    // but were subsequently not written to storage.
    //
    // Source: /proc/pid/io cancelled_write_bytes
    // Importance: minor
    // Aggregation: sum
    uint64 cancelled_write_bytes = 14;
}

// NetworkStat: basic network statistics for all of backend processes
// associated with query or session sent/received to/from the network layer depending on the context.
message NetworkStat {
    // total_bytes: total number of bytes (including headers) that all of backend processes
    // associated with query or session sent/received to/from the network layer.
    //
    // Importance: major
    // Aggregation: sum
    uint32 total_bytes = 1;

    // tuple_bytes: total number of tuples only bytes (without headers) that all of backend processes
    // associated with query or session sent/received to/from the network layer.
    //
    // Importance: minor
    // Aggregation: sum
    uint32 tuple_bytes = 2;

    // chunks: total number of chunks (tuples only) that all of backend processes
    // associated with query or session sent/received to/from the network layer.
    //
    // Importance: normal
    // Aggregation: sum
    uint32 chunks = 3;

    // the stats here is the same except uses uint64, uint32 is too snal for aggregated stat
    uint64 total_bytes_long = 4;
    uint64 tuple_bytes_long = 5;
    uint64 chunks_long = 6;

}

// InterconnectStat: detailed interconnect statistics.
message InterconnectStat {
    // total_recv_queue_size: max size of receive queue
    // of all backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: max
    uint64 total_recv_queue_size = 1;

    // recv_queue_size_counting_time: total times when computation of total_recv_queue_size was performed
    // by all of backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    uint64 recv_queue_size_counting_time = 2;

    // total_capacity: max size of send queue
    // of all backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: max
    uint64 total_capacity = 3;

    // capacity_counting_time: total times when computation of total_capacity was performed
    // by all of backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    uint64 capacity_counting_time = 4;

    // total_buffers: min buffers available before sent packets
    // of all backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: min
    uint64 total_buffers = 5;

    // buffer_counting_time: total times when computation of total_buffers was performed
    // by all of backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    uint64 buffer_counting_time = 6;

    // active_connections_num: max (among all of backends) outgoing connections number
    // made by all of backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: max
    uint64 active_connections_num = 7;

    // retransmits: total number of retransmits
    // made by all of backend processes associated with query or session.
    //
    // Importance: major
    // Aggregation: sum
    int64 retransmits = 8;

    // startup_cached_pkt_num: total number of cached future packets
    // cached by all of backend processes associated with query or session.
    // Counts only when gp_interconnect_cache_future_packets = on.
    //
    // Importance: minor
    // Aggregation: sum
    int64 startup_cached_pkt_num = 9;

    // mismatch_num: total number of mismatched packets
    // received by all of backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    int64 mismatch_num = 10;

    // crc_errors: total number of packets that failed CRC verification
    // verified by all of backend processes associated with query or session.
    // Counts only when gp_interconnect_full_crc = on.
    //
    // Importance: normal
    // Aggregation: sum
    int64 crc_errors = 11;

    // snd_pkt_num: total number of outgoing packets
    // sent by all of backend processes associated with query or session.
    //
    // Importance: major
    // Aggregation: sum
    int64 snd_pkt_num = 12;

    // recv_pkt_num: total number of incoming packets
    // received by all of backend processes associated with query or session.
    //
    // Importance: major
    // Aggregation: sum
    int64 recv_pkt_num = 13;

    // disordered_pkt_num: total number of disordered packets
    // received by all of backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    int64 disordered_pkt_num = 14;

    // duplicated_pkt_num: total number of duplicated packets (already processed)
    // received by all of backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    int64 duplicated_pkt_num = 15;

    // recv_ack_num: total number of acknowledged packets
    // by all of backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    int64 recv_ack_num = 16;

    // status_query_msg_num: total number of status packets
    // sent by all of backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    int64 status_query_msg_num = 17;
}

// MetricInstrumentation: various statistics related to query plan nodes.
message MetricInstrumentation {
    // ntuples: total number of tuples produced by plan nodes
    // by all nodes of all backend processes associated with query or session.
    //
    // Importance: normal (useless as aggregated value)
    // Aggregation: sum
    uint64 ntuples = 1;

    // nloops: total number of times when all plan nodes
    // of all backend processes associated with query or session was executed.
    //
    // Importance: minor (useless as aggregated value)
    // Aggregation: sum
    uint64 nloops = 2;

    // tuplecount: total number of tuples emitted so far the current cycle
    // by all nodes of all backend processes associated with query or session.
    //
    // Importance: minor (useless as aggregated value)
    // Aggregation: sum
    uint64 tuplecount = 3;

    // firsttuple: total amount of time spent to get first tuple
    // by all nodes of all backend processes associated with query or session.
    //
    // Importance: minor (useless as aggregated value)
    // Aggregation: sum
    double firsttuple = 4;

    // startup: total amount of time spent on queries startup (optimiser's cost estimation)
    // by all backend processes associated with query or session.
    //
    // Importance: minor (useless as aggregated value)
    // Aggregation: sum
    double startup = 5;

    // total: total amount of time spent on queries total execution time
    // by all backend processes associated with query or session.
    //
    // Importance: minor (useless as aggregated value)
    // Aggregation: sum
    double total = 6;

    // shared_blks_hit: total number of shared blocks hit
    // by all backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    uint64 shared_blks_hit = 7;

    // shared_blks_read: total number of shared blocks read
    // by all backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    uint64 shared_blks_read = 8;

    // shared_blks_dirtied: total number of shared blocks dirtied
    // by all backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    uint64 shared_blks_dirtied = 9;

    // shared_blks_written: total number of shared blocks written
    // by all backend processes associated with query or session.
    //
    // Importance: minor
    // Aggregation: sum
    uint64 shared_blks_written = 10;

    // local_blks_hit: total number of local blocks hit
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    uint64 local_blks_hit = 11;

    // local_blks_read: total number of local blocks read
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    uint64 local_blks_read = 12;

    // local_blks_dirtied: total number of local blocks dirtied
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    uint64 local_blks_dirtied = 13;

    // local_blks_written: total number of local blocks written
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    uint64 local_blks_written = 14;

    // temp_blks_read: total number of temp blocks read
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    uint64 temp_blks_read = 15; /* temporary tables read stat */

    // temp_blks_written: total number of temp blocks written
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    uint64 temp_blks_written = 16;

    // blk_read_time: total amount of time spent reading data blocks
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    double blk_read_time = 17;

    // blk_write_time: total amount of time spent writing data blocks
    // by all backend processes associated with query or session.
    //
    // Importance: normal
    // Aggregation: sum
    double blk_write_time = 18;

    // sent: basic network statistics for all of backend processes
    // associated with query or session sent to the network layer.
    NetworkStat sent = 19;

    // received: basic network statistics for all of backend processes
    // associated with query or session received from the network layer.
    NetworkStat received = 20;

    // startup_time: total amount of time spent on queries startup (planning + queue time)
    // by all backend processes associated with query or session.
    //
    // Importance: minor (useless as aggregated value, also possible duplicate of startup)
    // Aggregation: sum
    double startup_time = 21;

    // inherited_calls: total number of executed nested queries (sub-queries)
    // by all backend processes associated with query or session.
    //
    // Importance: major
    // Aggregation: sum
    uint64 inherited_calls = 22;

    // inherited_time: total amount of time (in seconds) spent on executing nested queries (sub-queries)
    // by all backend processes associated with the query or session.
    //
    // Importance: major
    // Aggregation: sum
    double  inherited_time = 23;

    // interconnect: detailed interconnect statistics.
    InterconnectStat interconnect = 24;
}

// SpillInfo: detailed statistics about produced spill files.
message SpillInfo {
    // fileCount: total number of spill files
    // created by all of backend processes associated with query or session.
    //
    // Importance: major
    // Aggregation: sum
    int32 fileCount = 1;

    // totalBytes: total size of produced spill files
    // created by all of backend processes associated with query or session.
    //
    // Importance: major
    // Aggregation: sum
    int64 totalBytes = 2;
}
